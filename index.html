<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🇺🇦 Захист України v2</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <main class="shell" aria-label="Ukraine Tower Defense game">
    <header class="topline">
      <div>
        <p class="eyebrow">HTML5 Canvas Tower Defense</p>
        <h1>🇺🇦 Захист України v2</h1>
      </div>
      <div class="controls" aria-label="Game controls">
        <button id="startButton" type="button">Почати</button>
        <button id="pauseButton" type="button">Пауза</button>
        <button id="restartButton" type="button">Заново</button>
      </div>
    </header>

    <section class="game-frame">
      <canvas id="game" width="1160" height="660" aria-label="Ukraine defenders versus Russian attackers tower defense map"></canvas>
      <div id="gameOverlay" class="overlay is-visible">
        <div class="overlay-card">
          <p class="eyebrow">Українська оборона</p>
          <h2 id="overlayTitle">Готуй оборону</h2>
          <p id="overlayText">Став башти на траві, покращуй або продавай їх, стримуй хвилі атак.</p>
          <button id="overlayAction" type="button">Почати гру</button>
        </div>
      </div>
    </section>

    <p class="hint">Клік по полю будує башту. Клік по башті відкриває покращення або продаж. Клавіша Space ставить паузу.</p>
  </main>

  <script src="src/app.js" defer></script>
</body>
</html>
